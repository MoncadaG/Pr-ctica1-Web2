<h2>Carrito de compras</h2>

<section class="carrito-container">

@for(p of carrito(); track $index){

<div class="carrito-item">

<span class="nombre">{{p.name}}</span>

<span class="precio">{{p.price | currency}}</span>

</div>

}

</section>

<div class="total-box">

<h3>Total: {{ total() | currency }}</h3>

</div>

<div class="acciones">

<button class="boton-comprar" (click)="comprar()">
Comprar
</button>

<button class="boton-ticket" (click)="generarTicket()">
Generar Ticket
</button>

</div>
